<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>
</head>
<body>

  <section class="main">

    <div class="form">

      <h2 class="title_form">
        Stay updated!
      </h2>

      <p class="text_form">
        Join 60,000+ product managers receiving monthly updates on:
      </p>

      <input type="checkbox" name="" id="checkbox">
      <label for="checkbox">Product discovery and building what matters</label>
      <input type="checkbox" name="" id="checkbox">
      <label for="checkbox">Measuring to ensure updates are a success</label>
      <input type="checkbox" name="" id="checkbox">
      <label for="checkbox">And much more!</label>
      
      <form action="#">
        
        <label for="email">Email address</label>
        <input type="email" name="email@company.com" id="email">

        <input type="submit" value="Subscribe to monthly newsletter">

      </form>
      
    </div>

    <div class="success_popup">
   
      <dialog>

        <div class="illustration_popup">

        </div>

        <h2 class="title_popup">
          Thanks for subscribing!
        </h2>

        <p class="text_popup">
          A confirmation email has been sent to <strong>ash@loremcompany.com</strong>. 
          Please open it and click the button inside to confirm your subscription.
      </p>

      <button class="button_close">Dismiss message</button>
        
    </dialog>

    </div>

</section>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Decrescenzo Dani</a>.
  </div>

  <script src="script.js"></script>

</body>
</html>
